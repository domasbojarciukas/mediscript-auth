<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mediscript Auth Redirect</title>
</head>
<body>
  <script>
    // Extract tokens from Supabase URL fragment
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);

    const accessToken = params.get("access_token");
    const refreshToken = params.get("refresh_token");

    // Redirect back to your Streamlit app with tokens
    if (accessToken && refreshToken) {
      const target = new URL("https://mediscript.streamlit.app");

      target.searchParams.set("access_token", accessToken);
      target.searchParams.set("refresh_token", refreshToken);

      window.location.replace(target.toString());
    } else {
      // fallback
      window.location.replace("https://mediscript.streamlit.app");
    }
  </script>
</body>
</html>
